        });

        // --- CORE APPLICATION LOGIC --- //

        let currentChapterId = 'ch7';
        const tableBody = document.getElementById('vocab-table-body');
        const chapterTitle = document.getElementById('chapter-title');
        const nav = document.getElementById('sidebar-nav');
        const mobileNav = document.getElementById('mobile-nav');

        function initNav() {
            if(!nav || !mobileNav) return;
            
            nav.innerHTML = '';
            mobileNav.innerHTML = '';
            
            vocabData.forEach(chapter => {
                // Desktop Nav Item
                const btn = document.createElement('button');
                btn.id = `nav-btn-${chapter.id}`;
                
                btn.innerHTML = `
                    <div class="nav-icon-container mr-3 p-1.5 rounded-lg transition-colors duration-200">
                        ${chapter.navIcon}
                    </div>
                    <span class="truncate">${chapter.title}</span>
                `;
                
                btn.onclick = () => {
                    if(currentChapterId === chapter.id) return;
                    currentChapterId = chapter.id;
                    updateNavState();
                    renderTable();
                };
                nav.appendChild(btn);

                // Mobile Nav Item
                const option = document.createElement('option');
                option.value = chapter.id;
                option.textContent = chapter.title;
                mobileNav.appendChild(option);
            });
            updateNavState();
        }

        function updateNavState() {
            vocabData.forEach(chapter => {
                const btn = document.getElementById(`nav-btn-${chapter.id}`);
                if (!btn) return;

                const iconContainer = btn.querySelector('.nav-icon-container');
                const isActive = chapter.id === currentChapterId;
                
                if (isActive) {
                    btn.className = `nav-btn w-full flex items-center px-4 py-3 rounded-xl transition-all duration-200 group text-left bg-sky-50 dark:bg-sky-500/10 text-sky-700 dark:text-sky-400 font-semibold shadow-[0_1px_2px_rgba(14,165,233,0.05)]`;
                    iconContainer.className = `nav-icon-container mr-3 p-1.5 rounded-lg transition-colors duration-200 bg-sky-100 dark:bg-sky-500/20 text-sky-600 dark:text-sky-400`;
                } else {
                    btn.className = `nav-btn w-full flex items-center px-4 py-3 rounded-xl transition-all duration-200 group text-left text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-700/50 hover:text-slate-900 dark:hover:text-slate-200 font-medium active:scale-[0.98]`;
                    iconContainer.className = `nav-icon-container mr-3 p-1.5 rounded-lg transition-colors duration-200 bg-slate-100 dark:bg-slate-800 text-slate-400 dark:text-slate-500 group-hover:bg-white dark:group-hover:bg-slate-700 group-hover:text-slate-500 dark:group-hover:text-slate-300 shadow-sm`;
                }
            });
            
            if (mobileNav) mobileNav.value = currentChapterId;
        }

        mobileNav?.addEventListener('change', (e) => {
            currentChapterId = e.target.value;
            updateNavState();
            renderTable();
        });

        function renderTable() {
            if (!tableBody || !chapterTitle) return;

            const chapter = vocabData.find(c => c.id === currentChapterId);
            
            // Retrigger Title Animation
            chapterTitle.classList.remove('animate-fade-in');
            void chapterTitle.offsetWidth; // Trigger DOM reflow to restart animation
            chapterTitle.textContent = chapter.title;
            chapterTitle.className = `text-2xl sm:text-3xl font-extrabold tracking-tight animate-fade-in transition-colors duration-300 ${chapter.colorClass}`;
            
            // Build string for faster rendering (Optimization)
            const rowsHtml = chapter.words.map((wordObj, index) => {
                let wordTypeClass = "";
                let clickableAttr = "";
                let trHoverClass = "hover:bg-slate-50 dark:hover:bg-slate-700/30";
                
                if (wordObj.de.startsWith('der ') || wordObj.de.startsWith('die ') || wordObj.de.startsWith('das ')) {
                    wordTypeClass = "text-sky-600 dark:text-sky-400";
                } else if (wordObj.isVerb) {
                    wordTypeClass = "text-teal-600 dark:text-teal-400 cursor-pointer border-b border-dashed border-teal-300 dark:border-teal-600 hover:border-teal-500 dark:hover:border-teal-400 pb-0.5 transition-colors";
                    clickableAttr = `onclick="openModal('${wordObj.de}')" title="Click for conjugation"`;
                    trHoverClass = "hover:bg-teal-50/50 dark:hover:bg-teal-900/20";
                } else {
                    wordTypeClass = "text-amber-600 dark:text-amber-400";
                }

                // Staggered animation delay
                const delay = Math.min(index * 25, 500); 

                return `
                    <tr class="border-b border-slate-100 dark:border-slate-700/50 last:border-b-0 transition-colors duration-200 ${trHoverClass} animate-fade-in-up" style="animation-fill-mode: both; animation-delay: ${delay}ms;">
                        <td class="py-3 sm:py-3.5 px-4 sm:px-6 w-2/5 sm:w-1/3 align-top">
                            <div class="flex items-center mt-0.5">
                                <span class="text-[14px] sm:text-[15px] font-semibold tracking-wide ${wordTypeClass}" ${clickableAttr}>${wordObj.de}</span>
                            </div>
                        </td>
                        <td class="py-3 sm:py-3.5 px-4 sm:px-6 text-[14px] sm:text-[15px] text-slate-600 dark:text-slate-300 font-medium align-top">
                            <div class="flex items-start sm:items-center justify-between sm:justify-start">
                                <span class="leading-snug">${wordObj.en}</span>
                                <span class="ml-2 sm:ml-3 text-base sm:text-lg drop-shadow-sm flex-shrink-0 transition-transform duration-300 hover:scale-125 hover:rotate-12 cursor-default">${wordObj.icon}</span>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
            
            tableBody.innerHTML = rowsHtml;
        }

        const modal = document.getElementById('verb-modal');
        const modalBackdrop = document.getElementById('modal-backdrop');
        const modalContent = document.getElementById('modal-content');
        const modalCloseBtn = document.getElementById('modal-close');

        function openModal(verbInfinitive) {
            if (!modal) return;
            const verbData = verbDictionary[verbInfinitive];
            if (!verbData) return;

            document.getElementById('modal-verb-text').textContent = verbInfinitive;
            document.getElementById('modal-verb-translation').textContent = verbData.en;
            document.getElementById('modal-praeteritum').textContent = verbData.praeteritum;
            document.getElementById('modal-perfekt').textContent = verbData.perfekt;

            // Optimize Conjugation table rendering
            const pronouns = ['ich', 'du', 'er/sie/es', 'wir', 'ihr', 'sie/Sie'];
            const conjHtml = pronouns.map((pronoun, index) => `
                <tr class="hover:bg-slate-50 dark:hover:bg-slate-700/30 transition-colors border-b border-slate-100 dark:border-slate-700/50 last:border-0">
                    <td class="py-2.5 px-4 sm:px-5 text-sm font-medium text-slate-500 dark:text-slate-400 w-1/3">${pronoun}</td>
                    <td class="py-2.5 px-4 sm:px-5 text-sm font-semibold text-slate-800 dark:text-slate-200">${verbData.praesens[index]}</td>
                </tr>
            `).join('');
            document.getElementById('modal-conjugation-body').innerHTML = conjHtml;

            // Trigger Animation
            modal.classList.remove('hidden');
            requestAnimationFrame(() => {
                modal.classList.remove('opacity-0');
                modalContent.classList.remove('scale-95', 'translate-y-4');
                modalContent.classList.add('scale-100', 'translate-y-0');
            });
        }

        function closeModal() {
            if (!modal) return;
            modal.classList.add('opacity-0');
            modalContent.classList.remove('scale-100', 'translate-y-0');
            modalContent.classList.add('scale-95', 'translate-y-4');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300); // Wait for transition
        }

        // Use Optional Chaining (?.) to safely add event listeners
        modalCloseBtn?.addEventListener('click', closeModal);
        modalBackdrop?.addEventListener('click', closeModal);

        const themeToggleBtn = document.getElementById('theme-toggle');
        const themeToggleDarkIcon = document.getElementById('theme-toggle-dark-icon');
        const themeToggleLightIcon = document.getElementById('theme-toggle-light-icon');

        function updateThemeIcons() {
            if(!themeToggleDarkIcon || !themeToggleLightIcon) return;
            if (document.documentElement.classList.contains('dark')) {
                themeToggleDarkIcon.className = "absolute w-5 h-5 transition-all duration-500 transform -translate-y-10 opacity-0 group-hover:rotate-12";
                themeToggleLightIcon.className = "absolute w-5 h-5 transition-all duration-500 transform translate-y-0 opacity-100 group-hover:rotate-12";
            } else {
                themeToggleDarkIcon.className = "absolute w-5 h-5 transition-all duration-500 transform translate-y-0 opacity-100 group-hover:rotate-12";
                themeToggleLightIcon.className = "absolute w-5 h-5 transition-all duration-500 transform translate-y-10 opacity-0 group-hover:rotate-12";
            }
        }

        // Initial setup for the icons
        updateThemeIcons();

        themeToggleBtn?.addEventListener('click', function() {
            document.documentElement.classList.toggle('dark');
            
            if (document.documentElement.classList.contains('dark')) {
                localStorage.setItem('color-theme', 'dark');
            } else {
                localStorage.setItem('color-theme', 'light');
            }
            updateThemeIcons();
        });

        // Initialization
        initNav();
        renderTable();
    </script>
